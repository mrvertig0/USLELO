name: Publish USL2 Elo site

# This workflow only PUBLISHES the site -- it does not fetch data itself.
#
# Why: the data-fetch step (scripts/fetch_data.py) talks to Sofascore's
# API, which sits behind Cloudflare. Cloudflare blocks GitHub Actions'
# IP ranges outright (a very common, well-known block -- it's an
# IP-reputation block, not something fixable with headers or retries).
# So the fetch has to run somewhere with a normal residential IP
# instead: your own computer, on a schedule. See README.md ("Automating
# the daily update") for how that's set up.
#
# This workflow just takes whatever is currently in docs/ and (re)publishes
# it to GitHub Pages, any time main changes -- including when your
# scheduled local script pushes new data.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
